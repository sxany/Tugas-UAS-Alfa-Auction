<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
            font-family: sans-serif;
        }

        .login-card {
            background-color: #ffffff;
            padding: 30px 36px;
            border-radius: 12px;
            border: 1px solid #e8e8e8;
            width: 320px;
            
        }

        h1 {
            font-size: 22px;
            font-weight: 500;
            color: #111111;
            text-align: center;
            
        }

        
        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #555555;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            color: #111111;
            background: #ffffff;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #aaaaaa;
        }

        input::placeholder {
            color: #bbbbbb;
        }

        button {
            width: 100%;
            padding: 11px;
            background-color: #111111;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #333333;
        }

        p {
            text-align: center;
            font-size: 13px;
            color: #999999;
            margin-top: 20px;
            margin-bottom: 0;
        }

        a {
            color: #111111;
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 style="margin-bottom: 5px;">Pendaftaran</h1>
        <form action="get-api.php" method="POST">
            <div class="input-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" placeholder="" required>
            </div>

            <div class="input-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="" required>
            </div>

            <div class="input-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="" required>
            </div>

            <button type="submit">Daftar</button>
            <p>Sudah punya akun? <a href="/LoginPage/src/login.html">Login di sini</a></p>
        </form>
    </div>
</body>
</html>
